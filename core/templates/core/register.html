{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh] p-4">
    <div class="bg-white p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 w-full max-w-md">
        
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                <i class="fa-solid fa-user-plus text-xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Buat Akun Baru</h1>
            <p class="text-slate-500 mt-1 text-sm">Bergabung dan pelajari probabilitas sistematis.</p>
        </div>
        
        <form method="POST" action="" data-turbo="false">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-slate-500 text-xs font-bold mb-2 uppercase tracking-wider">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" 
                           name="{{ field.name }}" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 font-bold text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" 
                           required>
                    
                    <!-- Menampilkan Error jika Username sudah terpakai atau validasi gagal -->
                    {% if field.errors %}
                        <p class="text-red-500 text-xs font-bold mt-1.5 bg-red-50 p-2 rounded-lg border border-red-100">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-lg shadow-blue-600/20 mt-4 active:scale-[0.98]">
                Daftar Sekarang
            </button>
        </form>
        
        <p class="text-center text-slate-500 mt-6 text-sm font-medium">
            Sudah punya akun? <a href="{% url 'login_view' %}" class="text-blue-600 hover:underline font-bold">Masuk di sini</a>
        </p>
        
    </div>
</div>
{% endblock %}
