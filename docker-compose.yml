version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: parmadtic_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      # Membaca langsung dari file .env agar DRY dan Secure
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: parmadtic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  # Named volumes agar data tidak hilang saat kontainer dimatikan
  mysql_data:
  redis_data: